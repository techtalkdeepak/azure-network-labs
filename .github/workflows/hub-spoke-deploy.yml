name: Hub-Spoke — Deploy

on:
  workflow_dispatch:        # manual trigger from GitHub UI
  push:
    branches:
      - main
    paths:
      - 'labs/hub-spoke/**' # only triggers when hub-spoke files change

permissions:
  id-token: write
  contents: read

env:
  LOCATION: australiaeast
  DEPLOYMENT_NAME: hub-spoke-${{ github.run_number }}-${{ github.run_attempt }}

jobs:
  validate:
    name: Validate — What-if
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run what-if (preview changes)
        run: |
          az deployment sub what-if \
            --name ${{ env.DEPLOYMENT_NAME }}-whatif \
            --location ${{ env.LOCATION }} \
            --template-file labs/hub-spoke/main.bicep \
            --parameters labs/hub-spoke/parameters/australiaeast.json \
            --parameters adminUsername="${{ secrets.VM_ADMIN_USERNAME }}" \
            --parameters adminPassword="${{ secrets.VM_ADMIN_PASSWORD }}"

  deploy:
    name: Deploy — Hub and Spoke
    runs-on: ubuntu-latest
    needs: validate           # only runs if validate passes

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy hub-spoke lab
        run: |
          az deployment sub create \
            --name ${{ env.DEPLOYMENT_NAME }} \
            --location ${{ env.LOCATION }} \
            --template-file labs/hub-spoke/main.bicep \
            --parameters labs/hub-spoke/parameters/australiaeast.json \
            --parameters adminUsername="${{ secrets.VM_ADMIN_USERNAME }}" \
            --parameters adminPassword="${{ secrets.VM_ADMIN_PASSWORD }}"

      - name: Show deployment outputs
        run: |
          az deployment sub show \
            --name ${{ env.DEPLOYMENT_NAME }} \
            --query properties.outputs \
            --output table
